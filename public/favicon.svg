<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="coin" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ffe14d"/>
      <stop offset="100%" stop-color="#c8930a"/>
    </radialGradient>
    <clipPath id="c"><circle cx="32" cy="32" r="30"/></clipPath>
  </defs>

  <!-- Rim -->
  <circle cx="32" cy="32" r="32" fill="#7a5500"/>
  <!-- Face -->
  <circle cx="32" cy="32" r="30" fill="url(#coin)"/>

  <!-- White knockout behind letters for contrast -->
  <text x="32" y="45"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900" font-size="42"
    fill="white" stroke="white" stroke-width="4"
    text-anchor="middle" letter-spacing="-3"
    clip-path="url(#c)">D$</text>

  <!-- Green letters on top -->
  <text x="32" y="45"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900" font-size="42"
    fill="#0d6e2e" stroke="#0d6e2e" stroke-width="0.5"
    text-anchor="middle" letter-spacing="-3"
    clip-path="url(#c)">D$</text>
</svg>
