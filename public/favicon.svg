<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="coin" cx="42%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffe566"/>
      <stop offset="45%"  stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="45%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer rim -->
  <circle cx="32" cy="32" r="31" fill="#8B6914"/>
  <!-- Inner rim -->
  <circle cx="32" cy="32" r="28" fill="#c8930a"/>
  <!-- Coin face -->
  <circle cx="32" cy="32" r="25" fill="url(#coin)"/>
  <!-- Shine -->
  <circle cx="32" cy="32" r="25" fill="url(#shine)"/>

  <!-- D$ text — green money color, large -->
  <text
    x="32" y="41"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="30"
    fill="#1a7a3c"
    stroke="#0d4a22"
    stroke-width="0.8"
    text-anchor="middle"
    letter-spacing="-2"
  >D$</text>
</svg>
