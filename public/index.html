<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HexSlither - Multiplayer Snake</title>
  <link rel="stylesheet" href="css/lobby.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="lobby-container">
    <div class="title">HexSlither</div>
    <div class="subtitle">Multiplayer Snake Arena</div>

    <!-- Name input -->
    <div class="card">
      <h3>Your Name</h3>
      <input type="text" id="player-name" placeholder="Enter your name..." maxlength="20" value="Player">
    </div>

    <!-- Phantom Wallet -->
    <div class="card">
      <h3>Phantom Wallet</h3>
      <button class="btn btn-wallet" id="btn-wallet">Connect Phantom Wallet</button>

      <div class="wallet-info" id="wallet-info">
        <div class="wallet-address" id="wallet-address"></div>
        <div class="balance-row">
          <span class="balance-label">Balance</span>
          <span class="balance-value" id="wallet-balance">0.00 SOL</span>
        </div>
        <div class="wallet-actions">
          <button class="btn-small btn-deposit" id="btn-deposit">Deposit</button>
          <button class="btn-small btn-withdraw" id="btn-withdraw">Withdraw</button>
        </div>
      </div>
    </div>

    <!-- Server stats -->
    <div class="card">
      <h3>Server</h3>
      <div class="stats-row">
        <div>Players Online: <span id="stat-players">0</span></div>
        <div>Arena Size: <span id="stat-arena">—</span></div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card">
      <h3>Top Players</h3>
      <ul class="leaderboard-list" id="lobby-leaderboard">
        <li><span class="rank">—</span><span class="lb-name" style="color:#555">No players yet</span></li>
      </ul>
    </div>

    <!-- Play -->
    <button class="btn btn-play" id="btn-play">PLAY</button>
  </div>

  <!-- Deposit Modal -->
  <div class="modal-overlay" id="modal-deposit">
    <div class="modal">
      <h3>Deposit SOL</h3>
      <input type="number" id="deposit-amount" placeholder="Amount in SOL" min="0.01" step="0.01">
      <div class="modal-btns">
        <button class="btn-small btn-cancel" id="cancel-deposit">Cancel</button>
        <button class="btn-small btn-confirm" id="confirm-deposit">Deposit</button>
      </div>
    </div>
  </div>

  <!-- Withdraw Modal -->
  <div class="modal-overlay" id="modal-withdraw">
    <div class="modal">
      <h3>Withdraw SOL</h3>
      <input type="number" id="withdraw-amount" placeholder="Amount in SOL" min="0.01" step="0.01">
      <div class="modal-btns">
        <button class="btn-small btn-cancel" id="cancel-withdraw">Cancel</button>
        <button class="btn-small btn-confirm" id="confirm-withdraw">Withdraw</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/constants.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
