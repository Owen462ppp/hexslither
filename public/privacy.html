<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — DuelSeries</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: 'Segoe UI', Arial, sans-serif;

    .doc-meta { font-size: 0.82rem; color: #888; margin-bottom: 32px; }
    .doc-meta span { display: block; }
    .placeholder-box {
      background: #f0fdf4;
      border: 2px dashed #14F195;
      border-radius: 8px;
      padding: 40px 32px;
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .placeholder-box strong { display: block; font-size: 1.1rem; color: #111; margin-bottom: 10px; }
    a { color: #14F195; }
    @media (max-width: 600px) { .doc-wrap { padding: 28px 20px; } h1 { font-size: 1.4rem; } }

</head>
<body>
<div class="doc-wrap">

</div>

</html>
