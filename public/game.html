<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuelSeries - Playing</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="leaderboard">
      <h4>Leaderboard</h4>
      <ul id="leaderboard-list"></ul>
    </div>

    <button id="btn-alltime-lb" title="All-Time Leaderboard">🏆</button>

    <div id="fps-counter">FPS: --</div>
  </div>

  <!-- All-Time Leaderboard Modal -->
  <div id="modal-alltime" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>🏆 All-Time Top 10</span>
        <button id="modal-alltime-close">✕</button>
      </div>
      <ul id="alltime-list"><li style="color:#555">Loading…</li></ul>
    </div>
  </div>

  <!-- Admin Console (press ` to open) -->
  <div id="admin-console">
    <div id="admin-console-label">ADMIN</div>
    <input id="admin-input" type="text" placeholder='e.g. "bot" or "bot 3"' autocomplete="off" spellcheck="false">
    <div id="admin-feedback"></div>
  </div>

  <!-- Death Screen -->
  <div id="death-screen">
    <h2>YOU DIED</h2>
    <div class="death-stats">
      Length: <span id="death-length">0</span><br>
      Score: <span id="death-score">0</span>
    </div>
    <div class="death-btns">
      <button class="btn btn-respawn" id="btn-respawn">Play Again</button>
      <button class="btn btn-spectate" id="btn-spectate">👁 Spectate</button>
      <button class="btn btn-lobby" id="btn-lobby">Lobby</button>
    </div>
  </div>

  <!-- Q Cash-out timer ring -->
  <div id="q-timer">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
      <circle id="q-timer-ring" cx="40" cy="40" r="34" fill="none" stroke="#14F195" stroke-width="6"
        stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round"
        transform="rotate(-90 40 40)"/>
      <text id="q-timer-text" x="40" y="46" text-anchor="middle" font-size="22" font-weight="bold" fill="#14F195" font-family="Segoe UI, sans-serif">Q</text>
    </svg>
    <div id="q-timer-label">Hold to cash out</div>
  </div>

  <!-- Cash-out overlay -->
  <div id="cashout-screen">
    <h2>CASHED OUT</h2>
    <p>Your snake has been secured</p>
    <div class="cashout-btns">
      <button class="btn btn-spectate" id="btn-cashout-spectate">👁 Spectate</button>
      <button class="btn btn-lobby" id="btn-cashout-lobby">← Lobby</button>
    </div>
  </div>

  <!-- Spectate HUD -->
  <div id="spectate-bar">
    <button id="spectate-prev">&#8592;</button>
    <span id="spectate-label">Spectating: —</span>
    <button id="spectate-next">&#8594;</button>
    <button id="spectate-stop">⬅ Lobby</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/constants.js"></script>
  <script src="js/HexGrid.js"></script>
  <script src="js/Camera.js"></script>
  <script src="js/Renderer.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
