<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HexCell — Free Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/agar.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud-topright">
    <div class="hud-stat">
      <span class="hud-lbl">SCORE</span>
      <span class="hud-val" id="score-val">20</span>
    </div>
    <div class="hud-stat">
      <span class="hud-lbl">CELLS</span>
      <span class="hud-val" id="cells-val">1</span>
    </div>
  </div>

  <div id="hud-bottomleft">
    <div class="hud-tip"><kbd>SPACE</kbd> Split</div>
  </div>

  <!-- Death screen -->
  <div id="death-screen" class="hidden">
    <div class="death-card">
      <div class="death-title">You were eaten!</div>
      <div class="death-score">Score: <span id="death-score-val">0</span></div>
      <button id="btn-respawn">Play Again</button>
      <button id="btn-spectate" class="btn-spectate-death">&#128065; Spectate</button>
      <button id="btn-death-lobby" class="btn-outline">Back to Lobby</button>
    </div>
  </div>

  <!-- Spectate bar -->
  <div id="spectate-bar">
    <button id="spectate-prev">&#8592;</button>
    <span id="spectate-label">Spectating: —</span>
    <button id="spectate-next">&#8594;</button>
    <button id="spectate-stop">&#8592; Lobby</button>
  </div>

  <!-- Cashout screen -->
  <div id="cashout-overlay" class="hidden">
    <div class="cashout-card">
      <div class="cashout-title">SUCCESSFULLY<br>CASHED OUT</div>
      <div class="cashout-score">Score: <span id="cashout-score-val">0</span></div>
      <div class="cashout-btn-row">
        <button id="btn-cashout-respawn">Play Again</button>
        <button id="btn-cashout-spectate" class="btn-spectate-death">&#128065; Spectate</button>
        <button id="btn-cashout-lobby" class="btn-outline">Return to Lobby</button>
      </div>
    </div>
  </div>

  <!-- Admin console -->
  <div id="admin-console" class="hidden">
    <div id="admin-console-inner">
      <span id="admin-console-prompt">&#62;</span>
      <input id="admin-input" type="text" autocomplete="off" spellcheck="false" placeholder="bot 3" maxlength="40" />
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/agar.js"></script>
</body>
</html>
