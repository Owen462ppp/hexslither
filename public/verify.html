<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify — DuelSeries</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #070707;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#hex-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.18;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(17, 17, 17, 0.92);
      border: 1px solid #222;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .logo span { color: #14F195; }

    .subtitle {
      color: #6b7280;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .desc {
      color: #9ca3af;
      font-size: 0.92rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .desc strong { color: #fff; }

    .code-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .code-inputs input {
      width: 48px;
      height: 56px;
      background: #0a0a0a;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      color: #14F195;
      font-size: 1.6rem;
      font-weight: 700;
      font-family: monospace;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      caret-color: transparent;
    }
    .code-inputs input:focus {
      border-color: #14F195;
      box-shadow: 0 0 0 3px rgba(20,241,149,0.12);
    }
    .code-inputs input.error {
      border-color: #ef4444;
      color: #ef4444;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: #14F195;
      color: #060606;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .resend-row {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #6b7280;
    }
    .resend-row button {
      background: none;
      border: none;
      color: #14F195;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0;
      text-decoration: underline;
    }
    .resend-row button:disabled { color: #4b5563; cursor: default; text-decoration: none; }

    .error-msg {
      color: #ef4444;
      font-size: 0.84rem;
      margin-top: 10px;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(6,6,6,0.3);
      border-top-color: #060606;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="hex-bg"></canvas>

  <div class="card">
    <div class="logo">DUEL<span>SERIES</span></div>
    <div class="subtitle">New Device Sign-In</div>

    <p class="desc">
      We sent a <strong>6-digit code</strong> to your email.<br>
      Enter it below to verify your identity.
    </p>

    <div class="code-inputs" id="code-inputs">
      <input type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" maxlength="1" />
      <input type="text" inputmode="numeric" maxlength="1" />
      <input type="text" inputmode="numeric" maxlength="1" />
      <input type="text" inputmode="numeric" maxlength="1" />
      <input type="text" inputmode="numeric" maxlength="1" />
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn btn-primary" id="verify-btn" disabled>Verify</button>

    <div class="resend-row">
      Didn't get it? <button id="resend-btn">Resend code</button>
      <span id="resend-timer"></span>
    </div>
  </div>

  <script>
    // ── Hex background (same as lobby) ───────────────────────────────────────
    (() => {
      const canvas = document.getElementById('hex-bg');
      const ctx = canvas.getContext('2d');
      let W, H, cols, rows, hexes = [], t = 0;
      const HEX_R = 38, DX = HEX_R * Math.sqrt(3), DY = HEX_R * 1.5;
      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols = Math.ceil(W / DX) + 2;
        rows = Math.ceil(H / DY) + 2;
        hexes = [];
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
          const x = c * DX + (r % 2 === 1 ? DX / 2 : 0) - DX;
          const y = r * DY - DY;
          hexes.push({ x, y, phase: Math.random() * Math.PI * 2 });
        }
      }
      function drawHex(x, y, r, alpha) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 180 * (60 * i - 30);
          const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.strokeStyle = `rgba(20,241,149,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      function tick() {
        t += 0.008;
        ctx.clearRect(0, 0, W, H);
        for (const h of hexes) {
          const a = (Math.sin(t + h.phase) * 0.5 + 0.5) * 0.6 + 0.05;
          drawHex(h.x, h.y, HEX_R - 2, a);
        }
        requestAnimationFrame(tick);
      }
      window.addEventListener('resize', resize);
      resize();
      tick();
    })();

    // ── Code input logic ─────────────────────────────────────────────────────
    const inputs  = [...document.querySelectorAll('#code-inputs input')];
    const verifyBtn = document.getElementById('verify-btn');
    const errorMsg  = document.getElementById('error-msg');
    const resendBtn = document.getElementById('resend-btn');
    const resendTimer = document.getElementById('resend-timer');

    inputs[0].focus();

    function getCode() { return inputs.map(i => i.value).join(''); }
    function checkFull() { verifyBtn.disabled = getCode().length < 6; }
    function clearError() { errorMsg.textContent = ''; inputs.forEach(i => i.classList.remove('error')); }

    inputs.forEach((inp, idx) => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace') {
          clearError();
          if (!inp.value && idx > 0) { inputs[idx - 1].value = ''; inputs[idx - 1].focus(); }
          else inp.value = '';
          checkFull();
          e.preventDefault();
        }
      });
      inp.addEventListener('input', e => {
        clearError();
        const val = inp.value.replace(/\D/g, '');
        if (!val) { inp.value = ''; checkFull(); return; }
        // Handle paste of full code into first box
        if (val.length > 1) {
          const digits = val.slice(0, 6);
          digits.split('').forEach((d, i) => { if (inputs[i]) inputs[i].value = d; });
          inputs[Math.min(digits.length, 5)].focus();
          checkFull();
          return;
        }
        inp.value = val;
        if (idx < 5) inputs[idx + 1].focus();
        checkFull();
      });
    });

    // Submit on Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !verifyBtn.disabled) verifyBtn.click();
    });

    verifyBtn.addEventListener('click', async () => {
      const code = getCode();
      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '<span class="spinner"></span>';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || 'Invalid code. Please try again.';
          inputs.forEach(i => i.classList.add('error'));
          inputs.forEach(i => i.value = '');
          inputs[0].focus();
          verifyBtn.textContent = 'Verify';
          checkFull();
        }
      } catch {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        verifyBtn.textContent = 'Verify';
        checkFull();
      }
    });

    // ── Resend cooldown ──────────────────────────────────────────────────────
    let cooldown = 0;
    let cooldownInterval = null;
    function startCooldown(secs) {
      cooldown = secs;
      resendBtn.disabled = true;
      function tick() {
        if (cooldown <= 0) {
          resendTimer.textContent = '';
          resendBtn.disabled = false;
          clearInterval(cooldownInterval);
          return;
        }
        resendTimer.textContent = ` (${cooldown}s)`;
        cooldown--;
      }
      tick();
      cooldownInterval = setInterval(tick, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled = true;
      try {
        const res = await fetch('/auth/resend-code', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          errorMsg.style.color = '#14F195';
          errorMsg.textContent = 'Code resent! Check your email.';
          setTimeout(() => { errorMsg.style.color = ''; errorMsg.textContent = ''; }, 3000);
          startCooldown(30);
        } else {
          errorMsg.textContent = data.error || 'Could not resend code.';
          resendBtn.disabled = false;
        }
      } catch {
        errorMsg.textContent = 'Could not resend code.';
        resendBtn.disabled = false;
      }
    });

    startCooldown(30); // initial cooldown on page load
  </script>
</body>
</html>
