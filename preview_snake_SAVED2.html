<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Preview</title>
<style>
  body { margin:0; background:#1e1e1e; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function catmullPt(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return {
    x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}
function makeSpine(ctrl,steps){
  const pts=[];
  for(let i=0;i<ctrl.length-1;i++){
    const p0=ctrl[Math.max(0,i-1)],p1=ctrl[i],p2=ctrl[i+1],p3=ctrl[Math.min(ctrl.length-1,i+2)];
    for(let s=0;s<steps;s++) pts.push(catmullPt(p0,p1,p2,p3,s/steps));
  }
  pts.push(ctrl[ctrl.length-1]);
  return pts;
}

const ctrl = [
  {x:680, y:65},{x:590, y:80},{x:480, y:115},{x:360, y:165},
  {x:250, y:230},{x:165, y:310},{x:145, y:385},{x:185, y:445},
  {x:260, y:475},{x:360, y:480},{x:460, y:468},{x:555, y:442},{x:630, y:405},
];
const spine = makeSpine(ctrl, 22);
const N = spine.length;

const arc=[0];
for(let i=1;i<N;i++){
  const dx=spine[i].x-spine[i-1].x, dy=spine[i].y-spine[i-1].y;
  arc.push(arc[i-1]+Math.sqrt(dx*dx+dy*dy));
}
const totalArc=arc[N-1];
const MAX_R=48;
function getR(i){ return MAX_R*Math.min(1,(arc[i]/totalArc)*10); }

const color='#D4A020';

function buildPath(){
  ctx.beginPath();
  ctx.moveTo(spine[0].x,spine[0].y);
  for(let i=1;i<N-1;i++){
    const mx=(spine[i].x+spine[i+1].x)/2, my=(spine[i].y+spine[i+1].y)/2;
    ctx.quadraticCurveTo(spine[i].x,spine[i].y,mx,my);
  }
  ctx.lineTo(spine[N-1].x,spine[N-1].y);
}

ctx.fillStyle='#1e1e1e';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.lineCap='round';
ctx.lineJoin='round';

// Body
buildPath();
ctx.lineWidth = MAX_R * 2;
ctx.strokeStyle = color;
ctx.stroke();

// Crease lines — arc centered on each spine point, curving around the backward side
// Same technique as the head crease arc
const CREASE_SPACING = MAX_R * 0.88;
let dist = 0;
for(let i=N-2; i>0; i--){
  const dx=spine[i+1<N?i+1:i].x-spine[i].x, dy=spine[i+1<N?i+1:i].y-spine[i].y;
  dist += Math.sqrt(dx*dx+dy*dy);
  if(dist < CREASE_SPACING) continue;
  dist -= CREASE_SPACING;

  // Forward direction at this spine point
  const ax=spine[Math.min(i+2,N-1)].x-spine[i-2].x;
  const ay=spine[Math.min(i+2,N-1)].y-spine[i-2].y;
  const fwdAngle = Math.atan2(ay, ax);

  const fx = Math.cos(fwdAngle), fy = Math.sin(fwdAngle);

  // Gradient shadow: 4 thin arcs stepping away from crease, darkest near it
  for(const s of [{off:0,a:0.13},{off:0.07,a:0.08},{off:0.14,a:0.04},{off:0.21,a:0.02}]){
    ctx.beginPath();
    ctx.arc(spine[i].x + fx*MAX_R*s.off, spine[i].y + fy*MAX_R*s.off,
      MAX_R * 0.92, fwdAngle + Math.PI*0.5, fwdAngle - Math.PI*0.5, false);
    ctx.strokeStyle = `rgba(0,0,0,${s.a})`;
    ctx.lineWidth = MAX_R * 0.06;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // Crease line on top
  ctx.beginPath();
  ctx.arc(spine[i].x, spine[i].y, MAX_R,
    fwdAngle + Math.PI * 0.5, fwdAngle - Math.PI * 0.5, false);
  ctx.strokeStyle = 'rgba(0,0,0,0.40)';
  ctx.lineWidth = MAX_R * 0.055;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// Head
const head = spine[N-1];
const HR = MAX_R;
const lookback = Math.min(18,N-2);
const hAngle = Math.atan2(head.y-spine[N-1-lookback].y, head.x-spine[N-1-lookback].x);
const fwdX=Math.cos(hAngle), fwdY=Math.sin(hAngle);
const perpX=-Math.sin(hAngle), perpY=Math.cos(hAngle);

ctx.beginPath(); ctx.arc(head.x,head.y,HR,0,Math.PI*2);
ctx.fillStyle=color; ctx.fill();

// Gradient shadow on head crease
for(const s of [{off:0,a:0.13},{off:0.07,a:0.08},{off:0.14,a:0.04},{off:0.21,a:0.02}]){
  ctx.beginPath();
  ctx.arc(head.x + fwdX*MAX_R*s.off, head.y + fwdY*MAX_R*s.off,
    MAX_R*0.92, hAngle + Math.PI*0.5, hAngle - Math.PI*0.5, false);
  ctx.strokeStyle = `rgba(0,0,0,${s.a})`;
  ctx.lineWidth = MAX_R * 0.06;
  ctx.lineCap = 'round';
  ctx.stroke();
}
// Head crease line
ctx.beginPath();
ctx.arc(head.x, head.y, MAX_R, hAngle + Math.PI*0.5, hAngle - Math.PI*0.5, false);
ctx.strokeStyle = 'rgba(0,0,0,0.40)';
ctx.lineWidth = MAX_R * 0.055;
ctx.lineCap = 'round';
ctx.stroke();

// Eyes
const eyeR    = HR * 0.40;
const pupilR  = eyeR * 0.54;
const eyeSide = HR * 0.46;
const eyeFwd  = HR * 0.38; // pulled back slightly to keep bigger eyes inside head

for(const side of [-1,1]){
  const ex = head.x + fwdX*eyeFwd + perpX*eyeSide*side;
  const ey = head.y + fwdY*eyeFwd + perpY*eyeSide*side;
  ctx.beginPath(); ctx.arc(ex,ey,eyeR,0,Math.PI*2);
  ctx.fillStyle='#FFFFFF'; ctx.fill();
  const pupilShift = eyeR - pupilR;
  ctx.beginPath(); ctx.arc(ex+fwdX*pupilShift, ey+fwdY*pupilShift, pupilR,0,Math.PI*2);
  ctx.fillStyle='#060606'; ctx.fill();
}
</script>
</body>
</html>
